name: Build AeroTV Portable

on:
workflow_dispatch:

jobs:
build-windows:
runs-on: windows-latest

steps:
  - name: Checkout del código
    uses: actions/checkout@v4
    
  - name: Instalar Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20
      
  - name: Instalar Rust
    uses: dtolnay/rust-toolchain@stable
    
  - name: Instalar dependencias web
    run: npm install
    working-directory: ./AeroTV
    
  - name: Compilar el Binario Portable (Tauri)
    run: npm run tauri build
    working-directory: ./AeroTV
    
  - name: Subir el .exe para descargar
    uses: actions/upload-artifact@v4
    with:
      name: AeroTV-Portable
      path: AeroTV/src-tauri/target/release/*.exe
